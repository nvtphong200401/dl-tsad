experiment:
  name: "phase2_evidence_avg"
  description: "Evidence-only + average pooling + percentile threshold (no forecasts)"

data_processing:
  type: "RawWindowProcessor"
  window_size: 100
  stride: 10

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "AveragePoolingScoring"

postprocessing:
  threshold:
    type: "PercentileThreshold"
    params:
      percentile: 95.0
  min_anomaly_length: 3
  merge_gap: 5
