experiment:
  name: "phase2_stl_evidence"
  description: "STL decomposition + evidence extraction + max pooling (fast, CPU-only)"

data_processing:
  type: "STLProcessor"
  window_size: 100
  stride: 10
  params:
    forecast_horizon: 64
    robust: true
    num_synthetic_samples: 50

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - forecast_based
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "MaxPoolingScoring"

postprocessing:
  threshold:
    type: "PercentileThreshold"
    params:
      percentile: 95.0
  min_anomaly_length: 3
  merge_gap: 5
