experiment:
  name: "phase2_evidence_fast_p90"
  description: "Evidence-based with 90th percentile threshold (unsupervised, no labels needed)"

data_processing:
  type: "RawWindowProcessor"
  window_size: 100
  stride: 10

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "MaxPoolingScoring"

postprocessing:
  threshold:
    type: "PercentileThreshold"
    params:
      percentile: 90.0
  min_anomaly_length: 3
  merge_gap: 5
