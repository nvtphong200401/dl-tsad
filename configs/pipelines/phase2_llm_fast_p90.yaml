experiment:
  name: "phase2_llm_fast_p90"
  description: "Evidence + LLM reasoning with 90th percentile threshold (unsupervised)"

data_processing:
  type: "RawWindowProcessor"
  window_size: 100
  stride: 10

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "LLMReasoningScoring"
  params:
    backend_type: "azure_openai"
    batch_size: 10
    pre_filter_percentile: 90

postprocessing:
  threshold:
    type: "PercentileThreshold"
    params:
      percentile: 95.0
  min_anomaly_length: 3
  merge_gap: 5
