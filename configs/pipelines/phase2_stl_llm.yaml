experiment:
  name: "phase2_stl_llm"
  description: "STL decomposition + evidence extraction + LLM reasoning (fast Step 1)"

data_processing:
  type: "STLProcessor"
  window_size: 100
  stride: 10
  params:
    forecast_horizon: 64
    robust: true
    num_synthetic_samples: 50

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - forecast_based
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "LLMReasoningScoring"
  params:
    backend_type: "azure_openai"
    batch_size: 10
    pre_filter_percentile: 90

postprocessing:
  threshold:
    type: "F1OptimalThreshold"
  min_anomaly_length: 3
  merge_gap: 5
