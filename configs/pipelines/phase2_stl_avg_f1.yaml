experiment:
  name: "phase2_stl_avg_f1"
  description: "STL + evidence + average pooling + F1-optimal threshold (supervised)"

data_processing:
  type: "STLProcessor"
  window_size: 100
  stride: 10
  params:
    forecast_horizon: 64
    robust: true
    num_synthetic_samples: 50

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - forecast_based
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "AveragePoolingScoring"

postprocessing:
  threshold:
    type: "F1OptimalThreshold"
  min_anomaly_length: 3
  merge_gap: 5
