experiment:
  name: "phase2_evidence_heuristic"
  description: "Foundation model forecasts + evidence extraction + heuristic scoring"

data_processing:
  type: "FoundationModelProcessor"
  window_size: 30
  stride: 1
  params:
    forecast_horizon: 30
    models: ['chronos']
    chronos_model: "amazon/chronos-t5-small"
    num_samples: 20
    ensemble_strategy: "average"

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "MaxPoolingScoring"

postprocessing:
  threshold:
    type: "PercentileThreshold"
    params:
      percentile: 90.0
  min_anomaly_length: 3
  merge_gap: 5
