experiment:
  name: "aer"
  description: "AER: Auto-Encoder with Regression (Orion reference)"

data_processing:
  type: "AERProcessor"
  window_size: 100
  stride: 1
  params:
    lstm_units: 30            # Hidden units per direction for BiLSTM
    num_layers: 1
    dropout: 0.0
    reg_ratio: 0.5            # Regression vs reconstruction weight
    epochs: 35
    batch_size: 64
    learning_rate: 0.001
    validation_split: 0.2
    patience: 10              # Early stopping patience
    device: "cpu"             # Change to "cuda" if GPU available

detection:
  type: "HybridDetection"
  params:
    comb: "mult"              # Multiplicative scoring (matching Orion)
    lambda_rec: 0.5

scoring:
  type: "WeightedAverageScoring"

postprocessing:
  threshold:
    type: "F1OptimalThreshold"
  min_anomaly_length: 3
  merge_gap: 5
