experiment:
  name: "phase2_evidence_fast"
  description: "Phase 2 evidence-based detection WITHOUT Chronos (fast, no GPU needed)"

# Uses RawWindowProcessor (no foundation model) — runs in seconds not hours
data_processing:
  type: "RawWindowProcessor"
  window_size: 100
  stride: 10

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "MaxPoolingScoring"

postprocessing:
  threshold:
    type: "F1OptimalThreshold"
  min_anomaly_length: 3
  merge_gap: 5
