experiment:
  name: "phase2_llm_reasoning"
  description: "Foundation model forecasts + evidence extraction + LLM reasoning scoring"

data_processing:
  type: "FoundationModelProcessor"
  window_size: 30
  stride: 1
  params:
    forecast_horizon: 30
    models: ['chronos']
    chronos_model: "amazon/chronos-t5-tiny"
    num_samples: 20
    ensemble_strategy: "average"

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "LLMReasoningScoring"
  params:
    backend_type: "azure_openai"
    batch_size: 10
    temperature: 0.0

postprocessing:
  threshold:
    type: "PercentileThreshold"
    params:
      percentile: 90.0
  min_anomaly_length: 3
  merge_gap: 5
