experiment:
  name: "phase2_llm_reasoning"
  description: "TimesFM + Chronos ensemble + evidence extraction + LLM reasoning"

data_processing:
  type: "FoundationModelProcessor"
  window_size: 100
  stride: 1
  params:
    forecast_horizon: 64
    models: ['timesfm', 'chronos']
    timesfm_model: "google/timesfm-2.5-200m-pytorch"
    chronos_model: "amazon/chronos-t5-tiny"
    num_samples: 20
    ensemble_strategy: "average"

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - forecast_based
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "LLMReasoningScoring"
  params:
    backend_type: "azure_openai"
    batch_size: 10
    temperature: 0.0

postprocessing:
  threshold:
    type: "F1OptimalThreshold"
  min_anomaly_length: 3
  merge_gap: 5
