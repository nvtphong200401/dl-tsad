experiment:
  name: "phase2_stl_range_llm"
  description: "STL decomposition + evidence + AnoAgent-style LLM range detection"

data_processing:
  type: "STLProcessor"
  window_size: 100
  stride: 10
  params:
    forecast_horizon: 64
    robust: true
    num_synthetic_samples: 50

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - forecast_based
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "LLMRangeDetectionScoring"
  params:
    backend_type: "azure_openai"
    temperature: 0.0
    max_anomaly_ratio: 0.005
    min_anomalies: 3
    use_evidence_hints: true
    use_deseasonalized: true

postprocessing:
  threshold:
    type: "FixedThreshold"
    params:
      threshold: 0.5
  min_anomaly_length: 3
  merge_gap: 5
