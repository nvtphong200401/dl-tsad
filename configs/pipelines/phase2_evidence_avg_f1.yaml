experiment:
  name: "phase2_evidence_avg_f1"
  description: "Evidence-only + average pooling + F1-optimal threshold (supervised)"

data_processing:
  type: "RawWindowProcessor"
  window_size: 100
  stride: 10

detection:
  type: "EvidenceBasedDetection"
  params:
    enabled_categories:
      - statistical_tests
      - distribution_based
      - pattern_based

scoring:
  type: "AveragePoolingScoring"

postprocessing:
  threshold:
    type: "F1OptimalThreshold"
  min_anomaly_length: 3
  merge_gap: 5
